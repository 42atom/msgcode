<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>msgcode Main UI Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell app-shell--main">
      <main class="main-stage">
        <header class="topbar">
          <div class="topbar-main">
            <div class="brand-block brand-block--compact">
              <div class="brand-mark">M</div>
              <div>
                <p class="eyebrow">Prototype Research Surface</p>
                <h1>msgcode</h1>
              </div>
            </div>
            <div class="status-cluster">
              <div id="surface-status" class="status-pill">静态原型已就绪</div>
            </div>
          </div>
          <div class="status-cluster">
            <div class="status-pill">workspace-tree</div>
            <div class="status-pill">thread</div>
            <a class="icon-link" href="./settings.html" aria-label="打开设置" title="Settings">S</a>
          </div>
        </header>

        <div class="three-column">
          <section class="panel rail-panel">
            <div class="panel-head">
              <p class="eyebrow">Workspaces</p>
              <h3>活跃工作区与线程</h3>
            </div>
            <div id="workspace-tree" class="thread-tree"></div>
          </section>

          <section class="panel chat-panel">
            <div class="panel-head panel-head--inline">
              <div>
                <p class="eyebrow">当前线程</p>
                <h3 id="thread-title">未加载</h3>
              </div>
              <div class="thread-header-side">
                <div class="thread-header-meta">
                  <span id="thread-workspace-chip" class="inline-chip inline-chip--muted">workspace</span>
                  <span id="thread-channel-chip" class="inline-chip inline-chip--muted">source</span>
                  <span id="thread-kind-chip" class="inline-chip inline-chip--muted">readonly</span>
                </div>
              </div>
            </div>
            <div id="chat-log" class="chat-log"></div>
          </section>

          <section class="panel observer-panel">
            <div class="panel-head">
              <p class="eyebrow">Observer</p>
              <h3 id="observer-title">线程附带信息</h3>
            </div>
            <div class="observer-stack">
              <section class="info-block">
                <h4 id="prototype-note">原型研究面</h4>
                <p id="prototype-note-detail" class="info-note prototype-note__detail">这里只保留静态阅读和演示，不走正式宿主桥接。</p>
                <p class="info-note">一级入口保留，三栏结构保留，正式实现另走 src。</p>
              </section>

              <section class="info-block">
                <h4>工作状况 / Work Status</h4>
                <p id="work-status-line-1">暂无工作状况。</p>
                <p id="work-status-line-2"></p>
              </section>

              <section class="info-block">
                <h4 id="observer-secondary-title">日历 / 定时任务</h4>
                <div id="observer-secondary-content" class="schedule-list"></div>
              </section>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script src="./main.js"></script>
  </body>
</html>

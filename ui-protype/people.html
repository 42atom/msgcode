<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>msgcode People Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell app-shell--main">
      <main class="main-stage">
        <header class="topbar">
          <div class="topbar-main">
            <div class="brand-block brand-block--compact">
              <div class="brand-mark">M</div>
              <div>
                <p class="eyebrow">Workspace People</p>
                <h1>acme/ops</h1>
              </div>
            </div>
          </div>
          <div class="status-cluster">
            <a class="icon-link" href="./main.html" aria-label="返回项目页">⌂</a>
          </div>
        </header>

        <section class="view view--active">
          <section class="panel">
            <div class="panel-head panel-head--inline">
              <div>
                <p class="eyebrow">当前工作区人物表</p>
                <h3>人物（People）</h3>
              </div>
              <button id="fetch-channel-people" class="action-button">获取渠道人物</button>
            </div>

            <div id="people-empty-state" class="empty-state">
              <div class="empty-state__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 12a3.5 3.5 0 1 0 0-7a3.5 3.5 0 0 0 0 7Z"></path>
                  <path d="M5.5 19.5a6.5 6.5 0 0 1 13 0"></path>
                </svg>
              </div>
              <h4>可以标识本工作区人物角色</h4>
              <p>先获取当前渠道里的群成员，再决定谁要存入通讯录。</p>
            </div>

            <div id="people-workspace" class="people-layout people-layout--hidden">
              <section class="subpanel">
                <div class="subpanel-head">
                  <h4>渠道人物</h4>
                </div>
                <div id="channel-people-list" class="people-list">
                  <article class="pending-card" data-person-key="lin-finance">
                    <div class="pending-head">
                      <div>
                        <h5>飞书：小林</h5>
                        <p>id: 8811223 · 用户名: lin-finance</p>
                      </div>
                      <button class="ghost-mini js-save-person">存入通讯录</button>
                    </div>
                    <div class="pending-actions">
                      <button class="ghost-mini">忽略</button>
                    </div>
                  </article>

                  <article class="pending-card" data-person-key="zhou-ops">
                    <div class="pending-head">
                      <div>
                        <h5>飞书：阿周</h5>
                        <p>id: 8811888 · 用户名: zhou_ops</p>
                      </div>
                      <button class="ghost-mini js-save-person">存入通讯录</button>
                    </div>
                    <div class="pending-actions">
                      <button class="ghost-mini">忽略</button>
                    </div>
                  </article>
                </div>
              </section>

              <section class="subpanel">
                <div class="subpanel-head">
                  <h4>通讯录</h4>
                </div>
                <div id="address-book-list" class="people-list">
                  <div class="empty-inline">还没有人物被存入通讯录。</div>
                </div>
              </section>
            </div>
          </section>
        </section>
      </main>
    </div>
    <div id="person-edit-modal" class="modal-overlay is-hidden" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="person-edit-title">
        <div class="panel-head panel-head--inline modal-head">
          <div>
            <p class="eyebrow">编辑人物</p>
            <h3 id="person-edit-title">人物信息</h3>
          </div>
          <div class="modal-close-group">
            <button id="person-edit-cancel-top" type="button" class="ghost-mini">关闭</button>
            <button id="person-edit-close-x" type="button" class="icon-link icon-link--small" aria-label="关闭">×</button>
          </div>
        </div>
        <form id="person-edit-form" class="settings-sections">
          <section class="subpanel">
            <div class="subpanel-head">
              <h4>人物字段</h4>
            </div>
            <div class="form-grid form-grid--single">
              <label>
                <span>统一称谓</span>
                <input id="person-edit-title-input" type="text" value="" />
              </label>
              <label>
                <span>Tags</span>
                <input id="person-edit-tags-input" type="text" value="" placeholder="开发者, 用户, 提需求" />
              </label>
              <label>
                <span>备注</span>
                <textarea id="person-edit-note-input" rows="4"></textarea>
              </label>
            </div>
          </section>
          <div class="composer-actions">
            <button id="person-edit-cancel" type="button" class="action-button action-button--ghost">取消</button>
            <button type="submit" class="action-button">保存</button>
          </div>
        </form>
      </div>
    </div>
    <script src="./people.js"></script>
  </body>
</html>

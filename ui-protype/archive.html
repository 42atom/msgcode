<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>msgcode Archive Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- 桌面 App 原型：最小窗口宽度 1100px / 高度 680px；不支持移动端或纵向堆叠响应式。 -->
    <div class="app-shell app-shell--main">
      <main class="main-stage">
        <header class="topbar">
          <div class="topbar-main">
            <div class="brand-block brand-block--compact">
              <a class="icon-link" href="./main.html" aria-label="返回主界面">←</a>
              <div>
                <p class="eyebrow">Archive</p>
                <h1>历史归档</h1>
              </div>
            </div>
          </div>
          <div class="status-cluster">
            <div class="status-pill" id="archive-status">只看与恢复</div>
          </div>
        </header>

        <section class="view view--active">
          <div class="split-grid archive-grid">
            <section class="panel archive-panel">
              <div class="panel-head">
                <p class="eyebrow">项目归档</p>
                <h3>已归档工作区</h3>
              </div>
              <div class="archive-list" id="archived-workspaces"></div>
            </section>

            <section class="panel archive-panel">
              <div class="panel-head">
                <p class="eyebrow">线程归档</p>
                <h3 id="archived-threads-title">已归档线程</h3>
              </div>
              <div class="archive-list" id="archived-threads"></div>
            </section>
          </div>
          <section class="panel archive-command-panel">
            <div class="panel-head">
              <p class="eyebrow">CLI Flow</p>
              <h3>当前调用</h3>
            </div>
            <pre id="archive-command-preview" class="log-preview">msgcode appliance archive --workspace family --json</pre>
          </section>
          <p class="archive-footnote" id="archive-footnote">主界面只显示活跃工作区和活跃线程。归档内容只在这里查看与恢复。</p>
        </section>
      </main>
    </div>
    <script src="./archive.js"></script>
  </body>
</html>
